name: Code quality with flake8

on: [push]

jobs:
  testing_quality:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Flake8 the python source
      run: |
        pip install flake8 
        flake8 main.py > ./logs
        exit $(( `tail -1 ./logs` < 2 ? 0 : 1 )) 
        echo $(( `tail -1 ./logs` < 2 ? good job : clean this out ))
